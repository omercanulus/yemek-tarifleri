name: yemek_tarifleri
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # --- JSON TABANLI DİL PAKETİ ---
  easy_localization: ^3.0.7
  
  # Diğer Gerekli Paketler
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.9.1
  flutter_dotenv: ^5.2.1
  shared_preferences: ^2.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # 1. ASSETS KISMI (lib/ yazısını sildik)
  assets:
    - assets/images/          # Resimlerin yeni adresi
    - assets/translations/    # Çeviri dosyalarının adresi

  # 2. FONTS KISMI (Burada da lib/ yazısını siliyoruz)
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Black.ttf  # lib/ yok!
        - asset: assets/fonts/Nunito-Light.ttf  # lib/ yok!
          weight: 400